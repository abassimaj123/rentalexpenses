name: rental_expenses
description: Rental Expenses Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  google_mobile_ads: ^5.1.0
  shared_preferences: ^2.2.3
  in_app_purchase: ^3.2.0
  sqflite: ^2.3.3
  path: ^1.9.0
  url_launcher: ^6.3.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  in_app_review: ^2.0.9
  pdf: ^3.11.1
  printing: ^5.13.1
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icons/icon_foreground.png"
  adaptive_icon_background: "#C8102E"
  adaptive_icon_foreground: "assets/icons/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
