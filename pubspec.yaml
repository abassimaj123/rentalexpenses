name: rental_expenses
description: Rental Expenses Tracker
publish_to: 'none'
version: 1.0.5+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  calcwise_core:
    path: ../packages/calcwise_core
  flutter:
    sdk: flutter

  intl: ^0.20.0
  google_mobile_ads: ^5.1.0
  shared_preferences: ^2.2.3
  in_app_purchase: ^3.2.0
  sqflite: ^2.3.3
  path: ^1.9.0
  url_launcher: ^6.3.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  in_app_review: ^2.0.9
  share_plus: ^10.0.0
  pdf: ^3.11.1
  printing: ^5.13.1
  fl_chart: ^1.2.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^3.0.0
  timezone: ^0.10.0

dev_dependencies:
  calcwise_lint:
    git:
      url: https://github.com/abassimaj123/calcwise_core.git
      path: calcwise_lint
      ref: main
  custom_lint: ">=0.6.0 <0.8.0"
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icons/icon_foreground.png"
  adaptive_icon_background: "#16A34A"
  adaptive_icon_foreground: "assets/icons/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false



